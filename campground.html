<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Campground | Waterton View</title>

<link rel="stylesheet" href="styles.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
}

header {
  background:#2c3e50;
  color:white;
  padding:15px;
}

.container {
  max-width:1100px;
  margin: auto;
}

.section {
  padding:40px 20px;
}

.calendar-wrapper{
  display:grid;
  grid-template-columns:repeat(2,minmax(320px,1fr));
  gap:24px;
}

.month{
  background:#fff;
  border-radius:14px;
  padding:14px;
  box-shadow:0 6px 14px rgba(0,0,0,.12);
}

.weekdays{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  font-weight:800;
  text-align:center;
  font-size:12px;
  margin-bottom:6px;
}

.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  min-height:78px;
  border-radius:10px;
  background:#f4f9f0;
  border:1px solid rgba(44,62,80,.08);
  padding:6px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.day.empty{background:none;border:none;}
.day.past{background:#eee;color:#999;}
.day.closed{background:#e5e5e5;color:#777;}
.day.full{background:#f8d7da;color:#a33;}
.day.available{background:#dff0d8;}

.controls{
  display:flex;
  justify-content:space-between;
  margin:15px 0;
}

button{
  background:#4a7c29;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
}

.month h3{
  text-align:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <div class="container">
    <h1 style="margin:0;">Waterton View Adventure & RV Park</h1>
  </div>
</header>

<section class="section">
<div class="container">

<h2>Daily Camping Availability</h2>

<div class="controls">
<button id="prev">←</button>
<button id="next">→</button>
</div>

<div id="calendar" class="calendar-wrapper"></div>

</div>
</section>

<script>

// ✅ FIXED URL
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw32hUkqYJ_TFwyO0KlV7Fii1TOxWa1T3QTSXNM2eaqNxXK79lllHd7mZc6ZJgb7ubjCg/exec";

const calendarEl = document.getElementById("calendar");

const today = new Date();
today.setHours(0,0,0,0);

let calendarData = {};

function formatKey(d){
  d.setHours(0,0,0,0);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

function getState(date){
  date.setHours(0,0,0,0);

  if(date < today) return {status:"past"};

  const key = formatKey(date);

  if(calendarData[key] !== undefined){
    let val = Number(calendarData[key]);
    if(val === 0) return {status:"full"};
    return {status:"available", available:val};
  }

  return {status:"closed"};
}

// Build months
const months = [];
let pointer = new Date(today.getFullYear(), 0, 1);

for(let i=0;i<24;i++){
  months.push(new Date(pointer));
  pointer.setMonth(pointer.getMonth()+1);
}

let currentIndex = months.findIndex(m =>
  m.getMonth() === today.getMonth() &&
  m.getFullYear() === today.getFullYear()
);

function render(){
  calendarEl.innerHTML="";

  const visible = months.slice(currentIndex, currentIndex+2);

  visible.forEach(month=>{
    const div = document.createElement("div");
    div.className="month";

    const firstDay = new Date(month.getFullYear(),month.getMonth(),1);
    const lastDay = new Date(month.getFullYear(),month.getMonth()+1,0);

    let html = `
    <h3>${month.toLocaleString('default',{month:'long'})}</h3>
    <div class="weekdays">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="days">`;

    for(let i=0;i<firstDay.getDay();i++){
      html += `<div class="day empty"></div>`;
    }

    for(let d=1; d<=lastDay.getDate(); d++){
      const date = new Date(month.getFullYear(),month.getMonth(),d);
      const s = getState(date);

      let cls = "day " + s.status;
      let text = "";

      if(s.status === "available") text = s.available;
      if(s.status === "full") text = "0";
      if(s.status === "closed") text = "Closed";

      html += `
      <div class="${cls}">
        <div>${d}</div>
        <div>${text}</div>
      </div>`;
    }

    html += "</div>";
    div.innerHTML = html;
    calendarEl.appendChild(div);
  });
}

document.getElementById("prev").onclick = ()=>{
 if(currentIndex > 0){currentIndex--;render();}
}

document.getElementById("next").onclick = ()=>{
 if(currentIndex < months.length-2){currentIndex++;render();}
}

// Load data
fetch(WEB_APP_URL)
.then(res => res.json())
.then(data=>{
  calendarData = data.daily || {};
  render();
})
.catch(()=>{
  render();
});

</script>

</body>
</html>
