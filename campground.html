<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw32hUkqYJ_TFwyO0KlV7Fii1TOxWa1T3QTSXNM2eaqNxXK79lllHd7mZc6ZJgb7ubjCg/exec";

const calendarEl = document.getElementById("calendar");

const today = new Date();
today.setHours(0,0,0,0);

let calendarData = {};

function formatKey(d){
  d.setHours(0,0,0,0);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}

function getState(date){
  date.setHours(0,0,0,0);

  if(date < today) return {status:"past"};

  const key = formatKey(date);

  if(calendarData[key] !== undefined){
    let val = Number(calendarData[key]);
    if(val === 0) return {status:"full"};
    return {status:"available", available:val};
  }

  return {status:"closed"};
}

const months = [];
let pointer = new Date(today.getFullYear(), 0, 1);

for(let i=0; i<24; i++){
  months.push(new Date(pointer));
  pointer.setMonth(pointer.getMonth()+1);
}

let currentIndex = months.findIndex(m =>
  m.getMonth() === today.getMonth() &&
  m.getFullYear() === today.getFullYear()
);

function render(){
  calendarEl.innerHTML = "";

  const visible = months.slice(currentIndex, currentIndex+2);

  visible.forEach(month => {
    const div = document.createElement("div");
    div.className = "month";

    const firstDay = new Date(month.getFullYear(), month.getMonth(), 1);
    const lastDay = new Date(month.getFullYear(), month.getMonth()+1, 0);

    let html = `
      <h3>${month.toLocaleString('default',{month:'long'})}</h3>
      <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div>
        <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div class="days">`;

    for(let i=0; i<firstDay.getDay(); i++){
      html += `<div class="day empty"></div>`;
    }

    for(let d=1; d<=lastDay.getDate(); d++){
      const date = new Date(month.getFullYear(), month.getMonth(), d);
      const s = getState(date);

      let cls = "day " + s.status;
      let text = "";

      if(s.status === "available") text = s.available;
      if(s.status === "full") text = "0";
      if(s.status === "closed") text = "Closed";

      html += `
        <div class="${cls}">
          <div>${d}</div>
          <div>${text}</div>
        </div>`;
    }

    html += "</div>";
    div.innerHTML = html;
    calendarEl.appendChild(div);
  });
}

document.getElementById("prev").onclick = () => {
  if(currentIndex > 0){
    currentIndex--;
    render();
  }
};

document.getElementById("next").onclick = () => {
  if(currentIndex < months.length - 2){
    currentIndex++;
    render();
  }
};

fetch(WEB_APP_URL)
  .then(res => res.json())
  .then(data => {
    calendarData = data.daily || {};
    render();
  })
  .catch(() => {
    render();
  });
</script>
